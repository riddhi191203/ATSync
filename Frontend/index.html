<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Primary SEO -->
    <title>
      ATSync AI | AI Resume Analysis & Interview Preparation
    </title>

    <meta
      name="description"
      content="ATSync AI helps you optimize resumes, improve ATS scores, identify skill gaps, and prepare for interviews with AI-powered career insights."
    />

    <meta
      name="keywords"
      content="ATSync AI, AI resume analyser, ATS resume checker, resume optimization, AI interview preparation, skill gap analysis, resume ATS score"
    />

    <meta
      name="robots"
      content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"
    />

    <meta
      name="author"
      content="ATSync AI"
    />

    <meta
      name="theme-color"
      content="#020617"
    />

    <!-- Canonical -->
    <link
      rel="canonical"
      href="https://atsync-ai.vercel.app/"
    />

    <!-- Open Graph -->
    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:site_name"
      content="ATSync AI"
    />

    <meta
      property="og:title"
      content="ATSync AI | AI Resume Analysis & Interview Preparation"
    />

    <meta
      property="og:description"
      content="Analyze resumes with AI, improve ATS compatibility, generate interview questions, and get personalized preparation roadmaps."
    />

    <meta
      property="og:url"
      content="https://atsync-ai.vercel.app/"
    />

    <meta
      property="og:image"
      content="https://atsync-ai.vercel.app/favicon.png"
    />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="ATSync AI | AI Resume Analysis & Interview Preparation"
    />

    <meta
      name="twitter:description"
      content="AI-powered resume analysis, ATS scoring, interview preparation, and skill gap detection platform."
    />

    <meta
      name="twitter:image"
      content="https://atsync-ai.vercel.app/favicon.png"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ATSync AI",
        "url": "https://atsync-ai.vercel.app/",
        "description": "AI-powered resume analysis and interview preparation platform.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "All"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
